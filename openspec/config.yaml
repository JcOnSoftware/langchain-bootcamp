schema: spec-driven

context: |
  Tech stack: Bun 1.3 + TypeScript 5.9 (strict, noUncheckedIndexedAccess, verbatimModuleSyntax)
  Framework: @langchain/core@^1.1 + @langchain/langgraph@^1 + provider packages (anthropic/openai/google-genai)
  Architecture: Bun-workspaces monorepo; packages/{runner,cli,exercises}; lcdev CLI binary; runner patches BaseChatModel prototype to capture calls
  Testing: bun:test (*.test.ts next to sources); typecheck via `bunx tsc --noEmit`
  Style: no eslint/prettier/biome installed; conventions enforced via CLAUDE.md + peruano neutro tuteo in Spanish assets

strict_tdd: true

testing:
  test_command: "bun test"
  typecheck_command: "bunx tsc --noEmit"
  coverage_command: "bun test --coverage"
  layers:
    unit: bun:test
    integration: bun:test (spawn-based — cli.integration.test.ts)
    e2e: not installed
  linter: not installed
  formatter: not installed

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected packages (runner/cli/exercises)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Spanish exercise statements MUST be peruano neutro tuteo (NO voseo)
  design:
    - Document harness-level assert strategy (capture shape, patch targets)
    - Call out any BaseChatModel prototype patching implications
  tasks:
    - Group tasks by phase (infra, exercise impl, tests, docs, i18n)
    - Use hierarchical numbering (1.1, 1.2, …)
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (copy-and-evolve from sibling when applicable)
    - Load relevant coding skills (go-testing, skill-creator) when context matches
    - tdd: true
    - test_command: "bun test"
  verify:
    - test_command: "bun test"
    - typecheck_command: "bunx tsc --noEmit"
    - build_command: ""
    - coverage_threshold: 0
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
    - Preserve archive as audit trail under openspec/changes/archive/YYYY-MM-DD-{change}/
