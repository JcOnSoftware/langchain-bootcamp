name: Weekly health check

on:
  schedule:
    # Every Monday at 12:00 UTC
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  health-check:
    name: Full test suite against real APIs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run CLI + runner unit tests
        run: bun test packages/cli packages/runner

      - name: Run exercises against real API (Anthropic)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LCDEV_TARGET: solution
          LCDEV_PROVIDER: anthropic
        run: bun test packages/exercises

      - name: Run exercises against real API (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LCDEV_TARGET: solution
          LCDEV_PROVIDER: openai
        run: bun test packages/exercises

      - name: Run exercises against real API (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LCDEV_TARGET: solution
          LCDEV_PROVIDER: gemini
        run: bun test packages/exercises
